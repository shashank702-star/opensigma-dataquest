name: Deploy Learning Platform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Surge CLI
        run: npm install -g surge

      - name: Deploy to Primary Domain
        run: surge . opensigma-dataquest-984.surge.sh --token "${{ secrets.SURGE_TOKEN }}" --login "${{ secrets.SURGE_LOGIN }}"

      - name: Deploy to Secondary Domain
        run: surge . opensigma-learning.surge.sh --token "${{ secrets.SURGE_TOKEN }}" --login "${{ secrets.SURGE_LOGIN }}"
